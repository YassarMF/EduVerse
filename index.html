<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduVerse — Mulai Petualangan Belajarmu!</title>
  <meta name="description" content="EduVerse: Platform belajar gamifikasi untuk menjadi Data Analyst. Mulai belajar gratis sekarang!">

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./src/styles/main.css">

  <!-- Konfigurasi Path Aliases Native Browser -->
  <script type="importmap">
  {
    "imports": {
      "@/config/": "./src/config/",
      "@/core/": "./src/core/",
      "@/features/": "./src/features/"
    }
  }
  </script>
</head>
<body class="auth-page">

  <!-- Floating Decorative Shapes -->
  <div class="floating-shape shape-1"></div>
  <div class="floating-shape shape-2"></div>
  <div class="floating-shape shape-3"></div>
  <div class="floating-shape shape-4"></div>
  <div class="floating-shape shape-5"></div>

  <!-- Auth Card -->
  <main>
  <div class="auth-card">
    <div class="neo-card-static" style="padding: 2.5rem;">
      
      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i class="fa-solid fa-rocket"></i>
        </div>
        <span class="auth-logo-text">EduVerse</span>
      </div>

      <!-- Title -->
      <div class="text-center" style="margin-bottom: 2rem;">
        <h1 id="auth-title" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Selamat Datang, Explorer! 🚀</h1>
        <p id="auth-subtitle" class="text-muted" style="font-size: 0.9rem;">Masukkan email dan password untuk masuk.</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" autocomplete="off">
        <!-- Name Field (Hidden on Login) -->
        <div id="field-name" class="auth-field" style="display: none;">
          <label class="auth-label" for="input-name">
            <i class="fa-solid fa-user" style="margin-right: 0.3rem;"></i> Nama Lengkap
          </label>
          <input
            type="text"
            id="input-name"
            class="neo-input"
            placeholder="Masukkan nama kamu..."
            autocomplete="name"
          >
        </div>

        <!-- School Field (Hidden on Login) -->
        <div id="field-school" class="auth-field" style="display: none;">
          <label class="auth-label" for="input-school">
            <i class="fa-solid fa-school" style="margin-right: 0.3rem;"></i> Asal Sekolah/Kampus
          </label>
          <input
            type="text"
            id="input-school"
            class="neo-input"
            placeholder="Masukkan asal sekolah/kampus..."
          >
        </div>

        <div class="auth-field">
          <label class="auth-label" for="input-email">
            <i class="fa-solid fa-envelope" style="margin-right: 0.3rem;"></i> Email
          </label>
          <input
            type="email"
            id="input-email"
            class="neo-input"
            placeholder="Masukkan email..."
            required
            autocomplete="email"
          >
        </div>

        <div class="auth-field">
          <label class="auth-label" for="input-password">
            <i class="fa-solid fa-lock" style="margin-right: 0.3rem;"></i> Password
          </label>
          <input
            type="password"
            id="input-password"
            class="neo-input"
            placeholder="Masukkan password..."
            required
            minlength="6"
            autocomplete="current-password"
          >
        </div>

        <!-- Error Message -->
        <div id="login-error" class="auth-error hidden">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="login-error-text"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="login-btn" class="neo-btn neo-btn-primary neo-btn-lg neo-btn-block" style="margin-top: 0.5rem;">
          <span id="login-btn-text">Mulai Petualangan! 🎮</span>
          <span id="login-btn-spinner" class="hidden"><span class="spinner" style="border-color: white; border-top-color: transparent;"></span></span>
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center text-muted" style="margin-top: 1.5rem; font-size: 0.85rem;">
        <span id="toggle-text">Belum punya akun?</span>
        <a href="#" id="toggle-auth" style="font-weight: bold; text-decoration: none;">Daftar di sini</a>
      </p>
    </div>
  </div>
  </main>

  <!-- Script -->
  <script type="module">
    import { AppState, UI } from '@/core/app.js';

    // If already logged in, redirect to dashboard
    if (AppState.getUser()) {
      window.location.href = 'pages/dashboard.html';
    }

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('input-email');
    const passwordInput = document.getElementById('input-password');
    const nameField = document.getElementById('field-name');
    const nameInput = document.getElementById('input-name');
    const schoolField = document.getElementById('field-school');
    const schoolInput = document.getElementById('input-school');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('login-btn-text');
    const btnSpinner = document.getElementById('login-btn-spinner');
    const errorBox = document.getElementById('login-error');
    const errorText = document.getElementById('login-error-text');
    
    // Toggle Elements
    const authTitle = document.getElementById('auth-title');
    const authSubtitle = document.getElementById('auth-subtitle');
    const toggleText = document.getElementById('toggle-text');
    const toggleAuth = document.getElementById('toggle-auth');
    
    let isLoginMode = true;

    toggleAuth.addEventListener('click', (e) => {
      e.preventDefault();
      isLoginMode = !isLoginMode;
      hideError();
      
      if (isLoginMode) {
        authTitle.innerHTML = 'Selamat Datang, Explorer! 🚀';
        authSubtitle.textContent = 'Masukkan email dan password untuk masuk.';
        btnText.textContent = 'Masuk';
        toggleText.textContent = 'Belum punya akun?';
        toggleAuth.textContent = 'Daftar di sini';
        
        nameField.style.display = 'none';
        schoolField.style.display = 'none';
        nameInput.required = false;
        schoolInput.required = false;
      } else {
        authTitle.innerHTML = 'Mulai Petualangan! 🌟';
        authSubtitle.textContent = 'Buat akun baru untuk mulai belajar.';
        btnText.textContent = 'Daftar Sekarang';
        toggleText.textContent = 'Sudah punya akun?';
        toggleAuth.textContent = 'Masuk di sini';
        
        nameField.style.display = 'block';
        schoolField.style.display = 'block';
        nameInput.required = true;
        schoolInput.required = true;
      }
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.remove('hidden');
      errorBox.style.display = 'flex';
    }

    function hideError() {
      errorBox.classList.add('hidden');
      errorBox.style.display = 'none';
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      btnText.style.display = isLoading ? 'none' : 'inline';
      btnSpinner.classList.toggle('hidden', !isLoading);
      if (isLoading) btnSpinner.style.display = 'inline-flex';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const name = nameInput.value.trim();
      const school = schoolInput.value.trim();

      if (!email || !email.includes('@')) {
        showError('Email tidak valid.');
        emailInput.focus();
        return;
      }

      if (!password || password.length < 6) {
        showError('Password harus minimal 6 karakter.');
        passwordInput.focus();
        return;
      }

      setLoading(true);

      try {
        let user;
        if (isLoginMode) {
          user = await AppState.login(email, password);
        } else {
          user = await AppState.register(email, password, name, school);
        }
        
        if (user) {
          // Small delay for UX
          setTimeout(() => {
            window.location.href = 'pages/dashboard.html';
          }, 400);
        } else {
          showError('Terjadi kesalahan. Silakan coba lagi.');
          setLoading(false);
        }
      } catch (error) {
        console.error('Auth error:', error);
        
        // Handle Firebase Error Codes
        let errorMsg = 'Terjadi kesalahan (' + (error.code || error.message || 'Unknown') + '). Periksa koneksi internet.';
        if (error.code === 'auth/user-not-found') {
            errorMsg = 'Akun belum terdaftar. Silakan daftar terlebih dahulu.';
        } else if (error.code === 'auth/wrong-password') {
            errorMsg = 'Kredensial salah (password tidak sesuai).';
        } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/invalid-login-credentials') {
            errorMsg = 'Kredensial salah atau akun belum terdaftar.';
        } else if (error.code === 'auth/email-already-in-use') {
            errorMsg = 'Email sudah digunakan. Silakan masuk.';
        } else if (error.code === 'auth/weak-password') {
            errorMsg = 'Password terlalu lemah (minimal 6 karakter).';
        } else if (error.code === 'auth/too-many-requests') {
            errorMsg = 'Terlalu banyak percobaan. Coba lagi nanti.';
        } else if (error.code === 'auth/invalid-email') {
            errorMsg = 'Format email tidak valid.';
        }
        
        showError(errorMsg);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
