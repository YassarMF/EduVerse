<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Planner | EduVerse</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-zinc-950 text-zinc-300 antialiased h-screen flex flex-col md:flex-row overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col hidden md:flex shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-zinc-800">
      <i class="fa-solid fa-code text-indigo-400 text-xl mr-3"></i>
      <span class="font-mono font-bold text-lg text-zinc-50 tracking-tight">EduVerse.</span>
    </div>
    
    <nav class="flex-1 py-6 px-4 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-chart-line w-5"></i> Dashboard
      </a>
      <a href="planner.html" class="flex items-center gap-3 px-4 py-3 bg-zinc-800/50 text-zinc-50 rounded-lg border border-zinc-700 shadow-sm transition-colors">
        <i class="fa-solid fa-kanban w-5"></i> Kanban Planner
      </a>
      <a href="focus.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-stopwatch w-5"></i> Focus Room
      </a>
      <a href="store.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-store w-5"></i> Avatar Store
      </a>
    </nav>
  </aside>

  <!-- Mobile Nav -->
  <div class="md:hidden fixed top-0 left-0 w-full h-16 bg-zinc-900 border-b border-zinc-800 z-50 flex items-center px-4">
    <a href="dashboard.html" class="text-zinc-400 hover:text-zinc-100">
      <i class="fa-solid fa-arrow-left text-lg"></i>
    </a>
    <span class="ml-4 font-mono font-bold text-zinc-50">Kanban</span>
  </div>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full overflow-hidden md:pt-0 pt-16">
    <div class="p-6 md:p-8 flex flex-col h-full">
      
      <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold text-zinc-50 mb-1 flex items-center gap-3">
            <i class="fa-solid fa-kanban text-indigo-400"></i> Study Planner
          </h1>
          <p class="text-zinc-500 text-sm">Geser tugas ke "Done" untuk mendapatkan +10 XP.</p>
        </div>
        
        <form id="add-task-form" class="flex items-center gap-2">
          <input type="text" id="new-task-input" required autocomplete="off" placeholder="Tugas baru..." 
            class="bg-zinc-900 border border-zinc-800 text-zinc-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5">
          <button type="submit" class="bg-indigo-500 text-white p-2.5 rounded-lg hover:bg-indigo-600 transition-colors shrink-0">
            <i class="fa-solid fa-plus"></i>
          </button>
        </form>
      </header>

      <!-- Kanban Board -->
      <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden pb-4">
        
        <!-- To Do Column -->
        <div class="bg-zinc-900/50 rounded-xl border border-zinc-800/50 flex flex-col overflow-hidden kanban-column" data-status="todo">
          <div class="p-4 border-b border-zinc-800/50 flex justify-between items-center bg-zinc-900">
            <h3 class="font-medium text-zinc-300"><i class="fa-regular fa-circle text-zinc-500 mr-2"></i>To-Do</h3>
            <span class="text-xs font-mono text-zinc-500 bg-zinc-800 px-2 py-1 rounded" id="count-todo">0</span>
          </div>
          <div class="p-3 flex-1 overflow-y-auto space-y-3 task-container" id="col-todo">
            <!-- Tasks injected via JS -->
          </div>
        </div>

        <!-- In Progress Column -->
        <div class="bg-zinc-900/50 rounded-xl border border-zinc-800/50 flex flex-col overflow-hidden kanban-column" data-status="progress">
          <div class="p-4 border-b border-zinc-800/50 flex justify-between items-center bg-zinc-900">
            <h3 class="font-medium text-zinc-300"><i class="fa-solid fa-spinner text-indigo-400 mr-2"></i>Progress</h3>
            <span class="text-xs font-mono text-zinc-500 bg-zinc-800 px-2 py-1 rounded" id="count-progress">0</span>
          </div>
          <div class="p-3 flex-1 overflow-y-auto space-y-3 task-container" id="col-progress">
            <!-- Tasks injected via JS -->
          </div>
        </div>

        <!-- Done Column -->
        <div class="bg-zinc-900/50 rounded-xl border border-zinc-800/50 flex flex-col overflow-hidden kanban-column" data-status="done">
          <div class="p-4 border-b border-zinc-800/50 flex justify-between items-center bg-zinc-900">
            <h3 class="font-medium text-zinc-300"><i class="fa-solid fa-check-circle text-emerald-500 mr-2"></i>Done</h3>
            <span class="text-xs font-mono text-zinc-500 bg-zinc-800 px-2 py-1 rounded" id="count-done">0</span>
          </div>
          <div class="p-3 flex-1 overflow-y-auto space-y-3 task-container" id="col-done">
            <!-- Tasks injected via JS -->
          </div>
        </div>

      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AppState.protectPage();
      loadTasks();
    });

    const STORAGE_KEY_TASKS = 'edu_tasks';

    function getTasks() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY_TASKS);
        return stored ? JSON.parse(stored) : [];
      } catch {
        return [];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY_TASKS, JSON.stringify(tasks));
    }

    // DOM Elements
    const cols = {
      'todo': document.getElementById('col-todo'),
      'progress': document.getElementById('col-progress'),
      'done': document.getElementById('col-done')
    };
    
    const counts = {
      'todo': document.getElementById('count-todo'),
      'progress': document.getElementById('count-progress'),
      'done': document.getElementById('count-done')
    };

    function loadTasks() {
      const tasks = getTasks();
      
      // Clear columns
      Object.values(cols).forEach(col => col.innerHTML = '');
      
      // Reset counts
      let tCount = 0, pCount = 0, dCount = 0;

      tasks.forEach(task => {
        const el = createTaskElement(task);
        if (cols[task.status]) {
          cols[task.status].appendChild(el);
          if (task.status === 'todo') tCount++;
          if (task.status === 'progress') pCount++;
          if (task.status === 'done') dCount++;
        }
      });

      counts['todo'].textContent = tCount;
      counts['progress'].textContent = pCount;
      counts['done'].textContent = dCount;
    }

    function createTaskElement(task) {
      const div = document.createElement('div');
      div.className = 'bg-zinc-800 p-3 rounded-lg border border-zinc-700 cursor-grab active:cursor-grabbing hover:border-indigo-500/50 transition-colors flex justify-between items-start group shadow-sm';
      div.draggable = true;
      div.id = task.id;
      
      let badgeClass = 'bg-zinc-700 text-zinc-400';
      if(task.status === 'progress') badgeClass = 'bg-indigo-500/20 text-indigo-400';
      if(task.status === 'done') badgeClass = 'bg-emerald-500/20 text-emerald-400';

      div.innerHTML = `
        <div class="pr-2">
          <p class="text-sm text-zinc-200">${task.text}</p>
        </div>
        <button onclick="deleteTask('${task.id}')" class="text-zinc-600 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 shrink-0">
          <i class="fa-solid fa-trash-can text-sm"></i>
        </button>
      `;

      // Drag Events
      div.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', task.id);
        setTimeout(() => div.classList.add('kanban-ghost'), 0);
      });
      
      div.addEventListener('dragend', () => {
        div.classList.remove('kanban-ghost');
        document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
      });

      return div;
    }

    // Handle Form Submit
    document.getElementById('add-task-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('new-task-input');
      const text = input.value.trim();
      
      if(text) {
        const tasks = getTasks();
        tasks.push({
          id: 'task_' + Date.now(),
          text: text,
          status: 'todo'
        });
        saveTasks(tasks);
        input.value = '';
        loadTasks();
      }
    });

    // Delete Task
    window.deleteTask = function(id) {
      let tasks = getTasks();
      tasks = tasks.filter(t => t.id !== id);
      saveTasks(tasks);
      loadTasks();
    };

    // Drag and Drop Logic on Columns
    document.querySelectorAll('.kanban-column').forEach(column => {
      column.addEventListener('dragover', e => {
        e.preventDefault();
        column.classList.add('drag-over');
      });

      column.addEventListener('dragleave', e => {
        column.classList.remove('drag-over');
      });

      column.addEventListener('drop', e => {
        e.preventDefault();
        column.classList.remove('drag-over');
        
        const id = e.dataTransfer.getData('text/plain');
        const newStatus = column.dataset.status;
        
        let tasks = getTasks();
        const taskIndex = tasks.findIndex(t => t.id === id);
        
        if (taskIndex > -1) {
          const oldStatus = tasks[taskIndex].status;
          if (oldStatus !== newStatus) {
            tasks[taskIndex].status = newStatus;
            saveTasks(tasks);
            loadTasks();
            
            // Reward for moving to Done
            if (newStatus === 'done') {
              const res = AppState.addXP(10);
              let msg = 'Tugas Selesai!';
              if(res && res.leveledUp) {
                msg = `Tugas Selesai! Kamu naik ke Level ${res.user.level}!`;
              }
              UI.showToast(msg, 'success', 10);
            }
          }
        }
      });
    });

  </script>
</body>
</html>
