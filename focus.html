<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Room | EduVerse</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-zinc-950 text-zinc-300 antialiased h-screen flex flex-col md:flex-row overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col hidden md:flex shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-zinc-800">
      <i class="fa-solid fa-code text-indigo-400 text-xl mr-3"></i>
      <span class="font-mono font-bold text-lg text-zinc-50 tracking-tight">EduVerse.</span>
    </div>
    
    <nav class="flex-1 py-6 px-4 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-chart-line w-5"></i> Dashboard
      </a>
      <a href="planner.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-kanban w-5"></i> Kanban Planner
      </a>
      <a href="focus.html" class="flex items-center gap-3 px-4 py-3 bg-zinc-800/50 text-zinc-50 rounded-lg border border-zinc-700 shadow-sm transition-colors">
        <i class="fa-solid fa-stopwatch w-5"></i> Focus Room
      </a>
      <a href="store.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-store w-5"></i> Avatar Store
      </a>
    </nav>
  </aside>

  <!-- Mobile Nav -->
  <div class="md:hidden fixed top-0 left-0 w-full h-16 bg-zinc-900 border-b border-zinc-800 z-50 flex items-center px-4">
    <a href="dashboard.html" class="text-zinc-400 hover:text-zinc-100">
      <i class="fa-solid fa-arrow-left text-lg"></i>
    </a>
    <span class="ml-4 font-mono font-bold text-zinc-50">Focus Room</span>
  </div>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full items-center justify-center relative md:pt-0 pt-16">
    
    <!-- Ambient Decor -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-emerald-500/5 rounded-full filter blur-[100px] pointer-events-none transition-all duration-1000" id="ambient-glow"></div>

    <div class="w-full max-w-xl text-center relative z-10 px-4">
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-mono uppercase tracking-wider mb-8">
        <i class="fa-solid fa-circle-dot text-indigo-400 animate-pulse"></i> Sesi Pomodoro
      </div>

      <div id="timer-display" class="font-mono text-8xl md:text-9xl font-bold text-zinc-100 tabular-nums tracking-tighter mb-12 drop-shadow-lg">
        25:00
      </div>

      <div class="flex justify-center gap-6">
        <button id="btn-start" class="w-16 h-16 rounded-full bg-indigo-500 text-zinc-50 flex items-center justify-center hover:bg-indigo-600 transition-all shadow-lg focus:outline-none ring-4 ring-indigo-500/20">
          <i id="icon-start" class="fa-solid fa-play text-2xl ml-1"></i>
        </button>
        <button id="btn-reset" class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-700 text-zinc-400 flex items-center justify-center hover:bg-zinc-800 hover:text-zinc-200 transition-all focus:outline-none">
          <i class="fa-solid fa-rotate-right text-xl"></i>
        </button>
      </div>
    </div>
  </main>

  <!-- Modal Achievement -->
  <div id="achievement-modal" class="fixed inset-0 bg-zinc-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 max-w-sm w-full mx-4 text-center transform scale-95 modal-fade shadow-2xl">
      <div class="w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 flex items-center justify-center text-4xl mx-auto mb-6">
        <i class="fa-solid fa-check"></i>
      </div>
      <h3 class="text-2xl font-bold text-zinc-50 mb-2">Sesi Selesai</h3>
      <p class="text-zinc-400 text-sm mb-6">Waktu fokus 25 menit telah ditambahkan ke analitik Anda.</p>
      
      <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-4 mb-6">
        <span class="block text-xs font-mono text-zinc-500 mb-1 uppercase">XP Diperoleh</span>
        <span class="block text-3xl font-bold text-emerald-400">+50 XP</span>
      </div>
      
      <p id="level-up-msg" class="text-indigo-400 font-medium mb-6 hidden">🎉 Selamat! Anda Naik Level!</p>

      <button id="btn-close-modal" class="w-full bg-indigo-500 text-zinc-50 font-medium py-3 rounded-lg hover:bg-indigo-600 transition-colors">
        Tutup
      </button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AppState.protectPage();
    });

    const FOCUS_MINUTES = 25;
    const FOCUS_SECONDS = FOCUS_MINUTES * 60;
    // const FOCUS_SECONDS = 3; // for debugging
    
    let timeLeft = FOCUS_SECONDS;
    let timerInterval = null;
    let isRunning = false;

    const display = document.getElementById('timer-display');
    const btnStart = document.getElementById('btn-start');
    const iconStart = document.getElementById('icon-start');
    const btnReset = document.getElementById('btn-reset');
    const modal = document.getElementById('achievement-modal');
    const btnCloseModal = document.getElementById('btn-close-modal');
    const levelUpMsg = document.getElementById('level-up-msg');
    const glow = document.getElementById('ambient-glow');

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateDisplay() {
      display.textContent = formatTime(timeLeft);
    }

    function toggleTimer() {
      if (isRunning) {
        clearInterval(timerInterval);
        iconStart.className = 'fa-solid fa-play text-2xl ml-1';
        btnStart.classList.replace('bg-amber-500', 'bg-indigo-500');
        btnStart.classList.replace('hover:bg-amber-600', 'hover:bg-indigo-600');
        btnStart.classList.replace('ring-amber-500/20', 'ring-indigo-500/20');
        glow.classList.replace('bg-amber-500/5', 'bg-emerald-500/5');
      } else {
        iconStart.className = 'fa-solid fa-pause text-2xl';
        btnStart.classList.replace('bg-indigo-500', 'bg-amber-500');
        btnStart.classList.replace('hover:bg-indigo-600', 'hover:bg-amber-600');
        btnStart.classList.replace('ring-indigo-500/20', 'ring-amber-500/20');
        glow.classList.replace('bg-emerald-500/5', 'bg-amber-500/5');
        
        timerInterval = setInterval(() => {
          timeLeft--;
          updateDisplay();
          
          if (timeLeft <= 0) {
            completeTimer();
          }
        }, 1000);
      }
      isRunning = !isRunning;
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      iconStart.className = 'fa-solid fa-play text-2xl ml-1';
      btnStart.className = 'w-16 h-16 rounded-full bg-indigo-500 text-zinc-50 flex items-center justify-center hover:bg-indigo-600 transition-all shadow-lg focus:outline-none ring-4 ring-indigo-500/20';
      glow.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-emerald-500/5 rounded-full filter blur-[100px] pointer-events-none transition-all duration-1000';
      timeLeft = FOCUS_SECONDS;
      updateDisplay();
    }

    function completeTimer() {
      resetTimer();
      
      // Update State
      AppState.addHistory(FOCUS_MINUTES);
      const res = AppState.addXP(50);
      
      // Update Modal
      if(res && res.leveledUp) {
        levelUpMsg.classList.remove('hidden');
        levelUpMsg.textContent = `🎉 Selamat! Anda Naik ke Level ${res.user.level}!`;
      } else {
        levelUpMsg.classList.add('hidden');
      }

      // Show Modal
      modal.classList.remove('hidden');
      modal.querySelector('div').classList.add('scale-100');
    }

    btnStart.addEventListener('click', toggleTimer);
    btnReset.addEventListener('click', resetTimer);

    btnCloseModal.addEventListener('click', () => {
      modal.classList.add('hidden');
    });
  </script>
</body>
</html>
