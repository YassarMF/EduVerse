<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | EduVerse</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-300 antialiased h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col hidden md:flex shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-zinc-800">
      <i class="fa-solid fa-code text-indigo-400 text-xl mr-3"></i>
      <span class="font-mono font-bold text-lg text-zinc-50 tracking-tight">EduVerse.</span>
    </div>
    
    <nav class="flex-1 py-6 px-4 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-zinc-800/50 text-zinc-50 rounded-lg border border-zinc-700 shadow-sm transition-colors">
        <i class="fa-solid fa-chart-line w-5"></i> Dashboard
      </a>
      <a href="planner.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-kanban w-5"></i> Kanban Planner
      </a>
      <a href="focus.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-stopwatch w-5"></i> Focus Room
      </a>
      <a href="store.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-store w-5"></i> Avatar Store
      </a>
    </nav>

    <div class="p-4 border-t border-zinc-800">
      <button onclick="AppState.logout()" class="flex items-center gap-3 w-full px-4 py-3 text-zinc-500 hover:text-red-400 transition-colors text-sm font-medium">
        <i class="fa-solid fa-right-from-bracket"></i> Akhiri Sesi
      </button>
    </div>
  </aside>

  <!-- Mobile Nav (Top) -->
  <div class="md:hidden fixed top-0 left-0 w-full h-16 bg-zinc-900 border-b border-zinc-800 z-50 flex items-center justify-between px-4">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-code text-indigo-400"></i>
      <span class="font-mono font-bold text-zinc-50">EduVerse.</span>
    </div>
    <!-- Mobile Menu Button could go here, omitting for simplicity, using text links below -->
  </div>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full overflow-y-auto md:pt-0 pt-16">
    <div class="p-8 max-w-6xl mx-auto w-full">
      
      <!-- Header -->
      <header class="flex justify-between items-end mb-10">
        <div>
          <h1 class="text-3xl font-bold text-zinc-50 mb-1">Status Sistem</h1>
          <p class="text-zinc-500 text-sm font-mono" id="greeting-text">Menyinkronkan data untuk guest_user...</p>
        </div>
        <div class="w-12 h-12 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-xl text-zinc-300 shadow-inner" id="header-avatar">
          <i class="fa-solid fa-user-astronaut"></i>
        </div>
      </header>

      <!-- Dashboard Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        
        <!-- Player Stats Card -->
        <div class="lg:col-span-2 bg-zinc-900 rounded-2xl p-6 border border-zinc-800 shadow-sm relative overflow-hidden">
          <div class="absolute -right-10 -top-10 text-zinc-800/30">
            <i class="fa-solid fa-shield-halved text-9xl"></i>
          </div>
          
          <div class="relative z-10">
            <h2 class="text-lg font-medium text-zinc-100 mb-6 flex items-center gap-2">
              <i class="fa-solid fa-bolt text-emerald-400"></i> XP & Level
            </h2>
            
            <div class="flex items-center gap-6 mb-8">
              <div class="text-center">
                <span class="block text-xs font-mono text-zinc-500 uppercase mb-1">Level Saat Ini</span>
                <span class="text-5xl font-extrabold text-zinc-50 tracking-tighter" id="level-display">1</span>
              </div>
              <div class="h-12 w-px bg-zinc-800"></div>
              <div>
                <span class="block text-xs font-mono text-zinc-500 uppercase mb-1">Total XP</span>
                <span class="text-2xl font-bold text-emerald-400" id="xp-display">0</span>
              </div>
            </div>

            <div class="max-w-md">
              <div class="flex justify-between text-xs font-mono text-zinc-400 mb-2">
                <span>Progres Level</span>
                <span id="xp-next-display">Butuh X XP lagi</span>
              </div>
              <div class="h-2 w-full bg-zinc-950 rounded-full overflow-hidden border border-zinc-800">
                <div id="xp-progress-bar" class="h-full bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)] transition-all duration-1000" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-zinc-900 rounded-2xl p-6 border border-zinc-800 shadow-sm flex flex-col">
          <h2 class="text-lg font-medium text-zinc-100 mb-4">Aksi Cepat</h2>
          <div class="space-y-3 flex-1">
            <a href="planner.html" class="flex items-center justify-between p-4 bg-zinc-950 rounded-xl border border-zinc-800 hover:border-indigo-500/50 hover:bg-zinc-900 transition-colors group">
              <div class="flex items-center gap-3">
                <i class="fa-solid fa-kanban text-indigo-400"></i>
                <span class="text-zinc-300 font-medium group-hover:text-zinc-100 transition-colors">Buka Planner</span>
              </div>
              <i class="fa-solid fa-arrow-right text-zinc-600 group-hover:text-indigo-400 transition-colors"></i>
            </a>
            <a href="focus.html" class="flex items-center justify-between p-4 bg-zinc-950 rounded-xl border border-zinc-800 hover:border-emerald-500/50 hover:bg-zinc-900 transition-colors group">
              <div class="flex items-center gap-3">
                <i class="fa-solid fa-stopwatch text-emerald-400"></i>
                <span class="text-zinc-300 font-medium group-hover:text-zinc-100 transition-colors">Mulai Fokus</span>
              </div>
              <i class="fa-solid fa-arrow-right text-zinc-600 group-hover:text-emerald-400 transition-colors"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- Analytics Chart -->
      <div class="bg-zinc-900 rounded-2xl p-6 border border-zinc-800 shadow-sm mb-10">
        <h2 class="text-lg font-medium text-zinc-100 mb-6 flex items-center gap-2">
          <i class="fa-solid fa-chart-area text-indigo-400"></i> Analitik Waktu Fokus
        </h2>
        <div class="w-full h-64 relative">
          <canvas id="focusChart"></canvas>
        </div>
      </div>

      <!-- Mobile navigation links (visible only on mobile) -->
      <div class="md:hidden grid grid-cols-2 gap-4 mb-10">
        <a href="planner.html" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-center flex flex-col items-center gap-2">
          <i class="fa-solid fa-kanban text-zinc-400"></i>
          <span class="text-xs text-zinc-300">Planner</span>
        </a>
        <a href="store.html" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-center flex flex-col items-center gap-2">
          <i class="fa-solid fa-store text-zinc-400"></i>
          <span class="text-xs text-zinc-300">Store</span>
        </a>
        <button onclick="AppState.logout()" class="col-span-2 p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-center flex flex-col items-center gap-2 text-red-400">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="text-xs">Keluar</span>
        </button>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AppState.protectPage();
      
      const user = AppState.getUser();
      
      // Update UI
      document.getElementById('greeting-text').textContent = `Sinkronisasi selesai. Sesi aktif untuk: ${user.username}`;
      document.getElementById('header-avatar').innerHTML = `<i class="fa-solid ${user.avatar}"></i>`;
      document.getElementById('level-display').textContent = user.level;
      document.getElementById('xp-display').textContent = user.xp;
      
      // Progress calculation
      const progress = AppState.getProgressPercent();
      setTimeout(() => {
        document.getElementById('xp-progress-bar').style.width = `${progress}%`;
      }, 100);

      const nextLevelXP = Math.pow((user.level) * 10, 2);
      const neededXP = nextLevelXP - user.xp;
      document.getElementById('xp-next-display').textContent = `Butuh ${neededXP} XP ke Lvl ${user.level + 1}`;

      // Initialize Chart.js
      initChart(user.history);
    });

    function initChart(historyData) {
      const ctx = document.getElementById('focusChart').getContext('2d');
      
      // Default to last 7 days if history is empty or short
      let labels = [];
      let dataPoints = [];

      if (!historyData || historyData.length === 0) {
        // Mock some empty labels for visually pleasing empty chart
        const today = new Date();
        for(let i=6; i>=0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          labels.push(d.toISOString().split('T')[0].slice(5)); // MM-DD
          dataPoints.push(0);
        }
      } else {
        // Get last 7 entries
        const recent = historyData.slice(-7);
        labels = recent.map(h => h.date.slice(5));
        dataPoints = recent.map(h => h.minutes);
      }

      Chart.defaults.color = '#a1a1aa'; // zinc-400
      Chart.defaults.font.family = 'Inter, sans-serif';

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Menit Fokus',
            data: dataPoints,
            borderColor: '#818cf8', // indigo-400
            backgroundColor: 'rgba(129, 140, 248, 0.1)',
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#818cf8',
            pointBorderColor: '#18181b', // zinc-900
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#27272a',
              titleColor: '#f4f4f5',
              bodyColor: '#e4e4e7',
              borderColor: '#3f3f46',
              borderWidth: 1,
              padding: 10,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return context.parsed.y + ' Menit';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#27272a', drawBorder: false }, // zinc-800
              ticks: { padding: 10, stepSize: 25 }
            },
            x: {
              grid: { display: false, drawBorder: false },
              ticks: { padding: 10 }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
