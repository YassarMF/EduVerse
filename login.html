<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EduVerse</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-zinc-950 text-zinc-300 antialiased min-h-screen flex items-center justify-center p-4">

  <!-- Background Ambient -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/10 rounded-full mix-blend-screen filter blur-[100px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full mix-blend-screen filter blur-[100px]"></div>
  </div>

  <div class="relative w-full max-w-md bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-800 p-8">
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-zinc-800 text-indigo-400 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border border-zinc-700 shadow-inner">
        <i class="fa-solid fa-code"></i>
      </div>
      <h1 class="text-2xl font-bold text-zinc-50 font-mono tracking-tight">EduVerse.</h1>
      <p class="text-zinc-400 text-sm mt-2">Masuk untuk memulai sesi fokus Anda.</p>
    </div>

    <form id="login-form" class="space-y-6">
      <div>
        <label for="username" class="block text-xs font-mono text-zinc-400 mb-2 uppercase tracking-wider">Username</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-terminal text-zinc-500"></i>
          </div>
          <input type="text" id="username" autocomplete="off"
            class="block w-full pl-10 pr-3 py-3 bg-zinc-950 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors font-mono text-sm" 
            placeholder="guest_user">
        </div>
        <p id="error-msg" class="text-red-400 text-xs mt-2 hidden"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Username tidak boleh kosong.</p>
      </div>

      <button type="submit" class="w-full flex items-center justify-center gap-2 bg-indigo-500 text-zinc-50 font-medium py-3 px-4 rounded-lg hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-zinc-900 transition-colors">
        Inisialisasi Sesi <i class="fa-solid fa-arrow-right text-sm"></i>
      </button>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script>
    // Routing Logic Check
    document.addEventListener('DOMContentLoaded', () => {
      if (AppState.getUser()) {
        window.location.href = 'dashboard.html';
      }
    });

    const form = document.getElementById('login-form');
    const input = document.getElementById('username');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = input.value.trim();
      
      if(!name) {
        errorMsg.classList.remove('hidden');
        input.classList.add('border-red-500');
        return;
      }
      
      // Proceed with initialization
      errorMsg.classList.add('hidden');
      input.classList.remove('border-red-500');
      
      AppState.initUser(name);
      
      const btn = this.querySelector('button[type="submit"]');
      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memuat...';
      btn.classList.add('opacity-70', 'cursor-not-allowed');
      
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 500);
    });

    input.addEventListener('input', () => {
      errorMsg.classList.add('hidden');
      input.classList.remove('border-red-500');
    });
  </script>
</body>
</html>
