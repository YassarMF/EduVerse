<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Store | EduVerse</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-zinc-950 text-zinc-300 antialiased h-screen flex flex-col md:flex-row overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col hidden md:flex shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-zinc-800">
      <i class="fa-solid fa-code text-indigo-400 text-xl mr-3"></i>
      <span class="font-mono font-bold text-lg text-zinc-50 tracking-tight">EduVerse.</span>
    </div>
    
    <nav class="flex-1 py-6 px-4 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-chart-line w-5"></i> Dashboard
      </a>
      <a href="planner.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-kanban w-5"></i> Kanban Planner
      </a>
      <a href="focus.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 rounded-lg transition-colors">
        <i class="fa-solid fa-stopwatch w-5"></i> Focus Room
      </a>
      <a href="store.html" class="flex items-center gap-3 px-4 py-3 bg-zinc-800/50 text-zinc-50 rounded-lg border border-zinc-700 shadow-sm transition-colors">
        <i class="fa-solid fa-store w-5"></i> Avatar Store
      </a>
    </nav>
  </aside>

  <!-- Mobile Nav -->
  <div class="md:hidden fixed top-0 left-0 w-full h-16 bg-zinc-900 border-b border-zinc-800 z-50 flex items-center px-4">
    <a href="dashboard.html" class="text-zinc-400 hover:text-zinc-100">
      <i class="fa-solid fa-arrow-left text-lg"></i>
    </a>
    <span class="ml-4 font-mono font-bold text-zinc-50">Avatar Store</span>
  </div>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full overflow-y-auto md:pt-0 pt-16">
    <div class="p-6 md:p-8 max-w-6xl mx-auto w-full">
      
      <header class="mb-10">
        <h1 class="text-3xl font-bold text-zinc-50 mb-2 flex items-center gap-3">
          <i class="fa-solid fa-store text-indigo-400"></i> Avatar Store
        </h1>
        <p class="text-zinc-500">Buka avatar baru dengan meningkatkan Level belajarmu.</p>
        <div class="inline-flex items-center gap-2 mt-4 px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg">
          <span class="text-sm font-mono text-zinc-400">Level Anda:</span>
          <span class="text-lg font-bold text-emerald-400" id="current-level-display">1</span>
        </div>
      </header>

      <!-- Store Grid -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6" id="avatar-grid">
        <!-- Injected via JS -->
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AppState.protectPage();
      const user = AppState.getUser();
      document.getElementById('current-level-display').textContent = user.level;
      renderStore(user.level, user.avatar);
    });

    const avatars = [
      { id: 'fa-user-astronaut', name: 'Rookie', req: 1 },
      { id: 'fa-user-ninja', name: 'Ninja', req: 2 },
      { id: 'fa-user-secret', name: 'Agent', req: 3 },
      { id: 'fa-user-graduate', name: 'Scholar', req: 4 },
      { id: 'fa-user-tie', name: 'Pro', req: 5 },
      { id: 'fa-user-doctor', name: 'Expert', req: 7 },
      { id: 'fa-user-gear', name: 'Engineer', req: 10 },
      { id: 'fa-chess-knight', name: 'Knight', req: 12 },
      { id: 'fa-chess-king', name: 'Master', req: 15 },
      { id: 'fa-crown', name: 'Legend', req: 20 }
    ];

    function renderStore(userLevel, currentAvatar) {
      const grid = document.getElementById('avatar-grid');
      grid.innerHTML = '';

      avatars.forEach(avatar => {
        const isUnlocked = userLevel >= avatar.req;
        const isSelected = avatar.id === currentAvatar;
        
        const card = document.createElement('div');
        card.className = `flex flex-col items-center p-6 rounded-2xl border transition-all ${
          isSelected ? 'bg-indigo-500/10 border-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.2)]' : 
          isUnlocked ? 'bg-zinc-900 border-zinc-800 hover:border-zinc-600 cursor-pointer' : 
          'bg-zinc-950 border-zinc-800 opacity-50 cursor-not-allowed grayscale'
        }`;
        
        if (isUnlocked && !isSelected) {
          card.onclick = () => selectAvatar(avatar.id);
        }

        const iconColor = isSelected ? 'text-indigo-400' : (isUnlocked ? 'text-zinc-300' : 'text-zinc-600');

        card.innerHTML = `
          <div class="w-16 h-16 rounded-full bg-zinc-950 flex items-center justify-center text-3xl mb-4 border ${isSelected ? 'border-indigo-500/50' : 'border-zinc-800'} shadow-inner">
            <i class="fa-solid ${avatar.id} ${iconColor}"></i>
          </div>
          <h3 class="font-medium text-zinc-100 text-sm mb-1">${avatar.name}</h3>
          
          ${isSelected ? 
            `<span class="text-xs font-bold text-indigo-400 uppercase tracking-widest mt-2">Terpilih</span>` : 
            isUnlocked ? 
            `<span class="text-xs text-zinc-500 font-mono mt-2">Tersedia</span>` : 
            `<div class="flex items-center gap-1 text-xs text-red-400 font-mono mt-2">
              <i class="fa-solid fa-lock text-[10px]"></i> Buka di Lvl ${avatar.req}
             </div>`
          }
        `;
        
        grid.appendChild(card);
      });
    }

    function selectAvatar(id) {
      const user = AppState.getUser();
      user.avatar = id;
      AppState.saveUser(user);
      renderStore(user.level, user.avatar);
      UI.showToast('Avatar berhasil diperbarui!', 'success');
    }
  </script>
</body>
</html>
